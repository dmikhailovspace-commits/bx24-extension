<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Сортировщик чатов BX24</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 14px 16px;
      min-width: 240px;
      font: 13px/1.35 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0a0b0d;
      color: #e9edf1;
    }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .brand-logo { height: 26px; width: auto; filter: invert(1); opacity: .93; display: block; }
    .brand-sub { font-size: 11px; color: rgba(255,255,255,.5); margin-top: 1px; }
    p { margin: 0 0 10px; color: rgba(255,255,255,.75); font-size: 12px; }
    .update { margin-bottom: 12px; padding: 10px; background: rgba(230,168,0,.12); border: 1px solid rgba(230,168,0,.35); border-radius: 8px; }
    .update-title { font-weight: 600; color: #e6a800; margin-bottom: 6px; }
    a { color: #6ab0ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .links { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,.1); }
    .links a { display: block; margin-bottom: 6px; font-size: 12px; }
    .muted { color: rgba(255,255,255,.45); font-size: 11px; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 8px 0; }
  </style>
</head>
<body>
  <div class="brand">
    <img src="icons/logo.png" class="brand-logo" alt="PENA Agency">
    <div>
      <div class="brand-sub">Сортировка чатов BX24</div>
    </div>
  </div>

  <div id="updateBlock" class="update" style="display:none">
    <div class="update-title">Доступно обновление</div>
    <p id="updateText"></p>
    <a id="updateLink" href="#" target="_blank" rel="noopener noreferrer">Скачать</a>
  </div>
  <div id="currentBlock">
    <p class="muted" id="currentText">Версия актуальна</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
