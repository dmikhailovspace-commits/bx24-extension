<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BX24 Chat Sorter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { padding: 14px 16px; min-width: 268px; font: 13px/1.4 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background: #0a0b0d; color: #e9edf1; }
    .brand { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .brand-logo { height:26px; filter:invert(1); opacity:.9; display:block; }
    .brand-name { font-size:13px; font-weight:600; }
    .brand-ver  { font-size:11px; color:rgba(255,255,255,.4); margin-top:1px; }
    .state { }

    /* idle */
    #st-idle .check-btn { width:100%; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.07); color:#e9edf1; font-size:12px; cursor:pointer; transition:background .15s; }
    #st-idle .check-btn:hover { background:rgba(255,255,255,.14); }

    /* checking */
    #st-checking { display:flex; align-items:center; gap:8px; padding:8px 0; }
    .spinner { width:16px; height:16px; border:2px solid rgba(255,255,255,.12); border-top-color:#6ab0ff; border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
    @keyframes spin { to { transform:rotate(360deg); } }
    #st-checking span { font-size:12px; color:rgba(255,255,255,.55); }

    /* up-to-date */
    #st-ok { display:flex; align-items:center; gap:8px; padding:8px 0; }
    .ok-icon { width:20px; height:20px; background:rgba(93,200,126,.18); border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    #st-ok p { font-size:12px; color:#5dc87e; }

    /* update found */
    #st-update { padding:10px 12px; background:rgba(230,168,0,.09); border:1px solid rgba(230,168,0,.28); border-radius:9px; }
    .u-title { font-weight:600; color:#e6a800; font-size:12px; margin-bottom:4px; }
    .u-ver   { font-size:11px; color:rgba(255,255,255,.5); margin-bottom:10px; }
    .u-instruction { font-size:11px; color:rgba(255,255,255,.65); line-height:1.55; }
    .u-instruction strong { color:#e6a800; }
    .re-check { margin-top:10px; padding:0; background:none; border:none; color:rgba(255,255,255,.3); font-size:11px; cursor:pointer; text-decoration:underline; display:block; }
    .re-check:hover { color:rgba(255,255,255,.6); }

    /* error */
    #st-err { padding:8px 10px; background:rgba(220,50,50,.07); border:1px solid rgba(220,50,50,.22); border-radius:8px; font-size:12px; color:rgba(255,110,110,.9); }

    hr { border:none; border-top:1px solid rgba(255,255,255,.08); margin:12px 0 10px; }
    .hint { font-size:11px; color:rgba(255,255,255,.27); line-height:1.45; }
  </style>
</head>
<body>
  <div class="brand">
    <img src="icons/logo.png" class="brand-logo" alt="PENA" onerror="this.style.display='none'">
    <div>
      <div class="brand-name">BX24 Chat Sorter</div>
      <div class="brand-ver" id="verLabel">v—</div>
    </div>
  </div>

  <!-- idle: кнопка запуска проверки -->
  <div id="st-idle" class="state">
    <button class="check-btn" id="checkBtn">Проверить обновления</button>
  </div>

  <!-- checking -->
  <div id="st-checking" class="state" style="display:none">
    <div class="spinner"></div>
    <span>Проверяю...</span>
  </div>

  <!-- up-to-date -->
  <div id="st-ok" class="state" style="display:none">
    <div class="ok-icon">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
        <path d="M2 6l3 3 5-5" stroke="#5dc87e" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <p>Установлена актуальная версия расширения</p>
  </div>

  <!-- update found -->
  <div id="st-update" class="state" style="display:none">
    <div class="u-title">Доступно обновление</div>
    <div class="u-ver" id="updateVerText"></div>
    <div class="u-instruction">
      Закройте Bitrix24 и откройте снова через ярлык<br>
      <strong>«Bitrix24 (PENA Agency)»</strong> в меню Пуск —<br>
      обновление применится автоматически.
    </div>
    <button class="re-check" id="reCheckBtn">Проверить снова</button>
  </div>

  <!-- error -->
  <div id="st-err" class="state" style="display:none"></div>

  <hr>
  <div class="hint">Запускайте Bitrix24 через ярлык&nbsp;«Bitrix24&nbsp;(PENA&nbsp;Agency)» в&nbsp;меню&nbsp;Пуск.</div>

  <script src="popup.js"></script>
</body>
</html>
